<!DOCTYPE html>
<html lang="es"
      xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">

    <title>Mi Pedido</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
          rel="stylesheet">

</head>

<body>

<div class="container mt-5">

    <h1 class="mb-4">
        🛒 Mi Pedido
    </h1>

    <table class="table table-bordered">

        <thead>

        <tr>
            <th>Producto</th>
            <th>Cantidad</th>
            <th>Subtotal</th>
        </tr>

        </thead>

        <tbody>

        <tr th:each="item : ${items}">

            <td th:text="${item.producto.nombre}">
            </td>

            <td th:text="${item.cantidad}">
            </td>

            <td th:text="${item.subtotal}">
            </td>

        </tr>

        </tbody>

    </table>
    <div class="text-end mt-4">

        <h3>
            Total:
            <span th:text="${total}"></span>
        </h3>

    </div>

    <div class="text-end mt-3">

        <a href="/finalizar-pedido"
           class="btn btn-success">

            Finalizar Compra

        </a>

    </div>

    <a href="/catalogo"
       class="btn btn-secondary">

        Seguir Comprando

    </a>

</div>

</body>

</html>
