<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Nuevo Producto</title>
</head>

<body>

<h1>Registrar Producto 🕯️</h1>

<form action="/guardar-producto" method="post">

    <label>Nombre:</label>
    <input type="text" name="nombre">
    <br><br>

    <label>Aroma:</label>
    <input type="text" name="aroma">
    <br><br>

    <label>Precio:</label>
    <input type="number" step="0.01" name="precio">
    <br><br>

    <button type="submit">
        Guardar Producto
    </button>

</form>

</body>
</html>
