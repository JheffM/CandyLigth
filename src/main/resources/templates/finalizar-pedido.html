<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Finalizar Pedido - CandyLigth</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet"
          th:href="@{/css/style.css}">
</head>

<body>

<div class="container mt-5">

    <div class="row justify-content-center">

        <div class="col-md-8">

            <div class="card shadow p-4">

                <h2 class="text-center mb-4">
                    🕯️ Finalizar Pedido
                </h2>

                <form>

                    <div class="mb-3">
                        <label class="form-label">
                            Nombre Completo
                        </label>

                        <input type="text"
                               class="form-control">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">
                            Correo Electrónico
                        </label>

                        <input type="email"
                               class="form-control">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">
                            Teléfono
                        </label>

                        <input type="text"
                               class="form-control">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">
                            Dirección de Entrega
                        </label>

                        <input type="text"
                               class="form-control">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">
                            Método de Pago
                        </label>

                        <select class="form-select">

                            <option>Yape</option>
                            <option>Plin</option>
                            <option>Tarjeta</option>
                            <option>Efectivo</option>

                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">
                            Total
                        </label>

                        <input type="text"
                               value="S/ 0.00"
                               readonly
                               class="form-control">
                    </div>

                    <div class="text-center">

                        <button type="submit"
                                class="btn btn-success">

                            Confirmar Pedido

                        </button>

                    </div>

                </form>

            </div>

        </div>

    </div>

</div>

</body>

</html>
