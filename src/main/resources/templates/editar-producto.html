<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Editar Producto</title>
</head>

<body>

<h1>Editar Producto ✏️</h1>

<form th:action="@{/guardar-producto}"
      th:object="${producto}"
      method="post">

    <input type="hidden" th:field="*{id}">

    <label>Nombre:</label>
    <input type="text" th:field="*{nombre}">
    <br><br>

    <label>Aroma:</label>
    <input type="text" th:field="*{aroma}">
    <br><br>

    <label>Precio:</label>
    <input type="number"
           step="0.01"
           th:field="*{precio}">
    <br><br>

    <button type="submit">
        Actualizar
    </button>

</form>

</body>
</html>
