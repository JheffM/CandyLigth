<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Nueva Factura</title>
</head>
<body>

<h1>Nueva Factura</h1>

<form action="/guardar-factura" method="post">

    <label>Pedido ID:</label>
    <input type="number" name="pedidoId">

    <br><br>

    <label>Fecha:</label>
    <input type="text" name="fechaEmision">

    <br><br>

    <label>Total:</label>
    <input type="number" step="0.01" name="totalFinal">

    <br><br>

    <label>Método de Pago:</label>
    <input type="text" name="metodoPago">

    <br><br>

    <label>Estado de Pago:</label>
    <input type="text" name="estadoPago">

    <br><br>

    <button type="submit">
        Guardar
    </button>

</form>

</body>
</html>
