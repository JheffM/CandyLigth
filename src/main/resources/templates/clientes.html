<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Clientes</title>
</head>

<body>

<h1>Lista de Clientes 👥</h1>

<a href="/nuevo-cliente">
    Nuevo Cliente
</a>

<br><br>

<table border="1">

    <tr>
        <th>ID</th>
        <th>Nombre</th>
        <th>Teléfono</th>
        <th>Correo</th>
        <th>Dirección</th>
        <th>Acciones</th>
    </tr>

    <tr th:each="cliente : ${clientes}">

        <td th:text="${cliente.id}"></td>

        <td th:text="${cliente.nombre}"></td>

        <td th:text="${cliente.telefono}"></td>

        <td th:text="${cliente.correo}"></td>

        <td th:text="${cliente.direccion}"></td>

        <td>

            <a th:href="@{/editar-cliente/{id}(id=${cliente.id})}">
                Editar
            </a>

            |

            <a th:href="@{/eliminar-cliente/{id}(id=${cliente.id})}">
                Eliminar
            </a>

        </td>

    </tr>

</table>

</body>
</html>
